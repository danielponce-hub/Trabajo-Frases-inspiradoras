<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motivación Universitaria</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }.container {
  text-align: center;
  background: rgba(0, 0, 0, 0.3);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  max-width: 400px;
}

h1 {
  margin-bottom: 20px;
  font-size: 24px;
}

#frase {
  font-size: 18px;
  margin: 20px 0;
  min-height: 60px;
}

button {
  background: #ff7eb3;
  border: none;
  padding: 10px 20px;
  color: white;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4f91;
  transform: scale(1.05);
}

.emoji {
  font-size: 30px;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🎓</div>
    <h1>Motivación para Universitarios</h1>
    <div id="frase">Haz clic en el botón para motivarte 💪</div>
    <button onclick="nuevaFrase()">Nueva frase</button>
  </div>  <script>
    const frases = [
      "No estás atrasado, estás en tu propio proceso.",
      "Cada pequeño avance cuenta, incluso en los días difíciles.",
      "El esfuerzo de hoy será tu orgullo mañana.",
      "No te rindas: las mejores notas vienen después del intento constante.",
      "Estudiar también es un acto de amor propio.",
      "No tienes que ser perfecto, solo constante.",
      "Los días difíciles también forman profesionales fuertes.",
      "Confía en ti, llegaste hasta aquí por una razón.",
      "Paso a paso también se termina la carrera.",
      "Tu yo del futuro te lo va a agradecer."
    ];

    function nuevaFrase() {
      const random = Math.floor(Math.random() * frases.length);
      document.getElementById('frase').textContent = frases[random];
    }
  </script></body>
</html>
